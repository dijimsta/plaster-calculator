name: Deploy Plaster Calculator Functions

on:
    workflow_dispatch:
    push:
        branches:
            - main
        paths:
            - functions/plaster-calculator-functions/**
            - generated/data-connector-admin/**

concurrency:
    group: deploy-plaster-calculator-functions
    cancel-in-progress: false

jobs:
    deploy:
        runs-on: ubuntu-latest
        environment:
            name: plaster-calculator-functions
            url: https://console.firebase.google.com/project/plaster-calculator/functions
        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v4
              with:
                  version: 11.1.3

            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build functions
              run: pnpm build

            - name: Deploy functions
              run: pnpm exec firebase deploy --only functions:plaster-calculator-functions --project plaster-calculator --token "$FIREBASE_TOKEN"
              env:
                  FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
