name: Deploy Python Functions

on:
    workflow_dispatch:
    push:
        branches:
            - main
        paths:
            - functions/floorplan-analyzer/**

concurrency:
    group: deploy-floorplan-analyzer
    cancel-in-progress: false

jobs:
    deploy:
        runs-on: ubuntu-latest
        timeout-minutes: 360
        environment:
            name: firebase-functions-python
            url: https://console.firebase.google.com/project/plaster-calculator/functions
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: yarn

            - uses: astral-sh/setup-uv@v8.1.0

            - name: Install dependencies
              run: yarn install --immutable

            - name: Deploy functions
              run: yarn firebase deploy --only functions:floorplan-analyzer --project plaster-calculator --token "$FIREBASE_TOKEN"
              env:
                  FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
