name: Check Formatting

on:
    push:
        branches:
            - main
    pull_request:

jobs:
    format:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: yarn

            - name: Install dependencies
              run: yarn install --immutable

            - name: Check formatting
              run: yarn format:check
