name: Checks

on:
    push:
        branches:
            - main
    pull_request:

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              with:
                  version: 10.24.0

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm build

    format:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              with:
                  version: 10.24.0

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm

            - uses: astral-sh/setup-uv@v5

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Check formatting (TypeScript)
              run: pnpm format:check

            - name: Check formatting (Python)
              run: uv run ruff format --check functions/floorplan-analyzer/

    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              with:
                  version: 10.24.0

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm

            - uses: astral-sh/setup-uv@v5

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint (TypeScript)
              run: pnpm lint:check

            - name: Lint (Python)
              run: uv run ruff check functions/floorplan-analyzer/

    dataconnect-dry-run:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              with:
                  version: 10.24.0

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Authenticate to Google Cloud
              uses: google-github-actions/auth@v3
              with:
                  credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

            - name: Dry run Data Connect deploy
              run: pnpm exec firebase deploy --only dataconnect --project plaster-calculator --dry-run

    storage-dry-run:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              with:
                  version: 10.24.0

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Dry run Storage deploy
              run: pnpm exec firebase deploy --only storage --project plaster-calculator --dry-run --token "$FIREBASE_TOKEN"
              env:
                  FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
