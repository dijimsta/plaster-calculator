name: Deploy Firebase Functions

on:
    push:
        branches:
            - main
        paths:
            - "data/**"
            - "functions/**"
            - "generated/**"
            - "dataconnect.yaml"
            - "firebase.json"
            - "package.json"
            - "yarn.lock"

jobs:
    deploy:
        name: Deploy ${{ matrix.codebase }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                codebase:
                    - plaster-calculator-functions
                    - floorplan-analyzer
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: yarn

            - uses: astral-sh/setup-uv@v8.1.0

            - name: Install dependencies
              run: yarn install --immutable

            - name: Generate Data Connect SDKs
              run: yarn generate:dataconnect

            - name: Build functions
              run: yarn build

            - name: Deploy functions
              run: yarn firebase deploy --only "functions:${{ matrix.codebase }}" --project plaster-calculator --token "$FIREBASE_TOKEN"
              env:
                  FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
