name: Deploy TypeScript Functions

on:
    workflow_dispatch:
    push:
        branches:
            - main
        paths:
            - functions/plaster-calculator-functions/**
            - generated/example-data-connector/**

concurrency:
    group: firebase-functions-deploy
    cancel-in-progress: false

jobs:
    deploy:
        runs-on: ubuntu-latest
        environment:
            name: firebase-functions-node
            url: https://console.firebase.google.com/project/plaster-calculator/functions
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: yarn

            - name: Install dependencies
              run: yarn install --immutable

            - name: Build functions
              run: yarn build

            - name: Deploy functions
              run: yarn firebase deploy --only functions:plaster-calculator-functions --project plaster-calculator --token "$FIREBASE_TOKEN"
              env:
                  FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
