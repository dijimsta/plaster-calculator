type Project
    @table
    @index(
        fields: ["ownerId", "salesStatus", "updatedAt"]
        order: [ASC, ASC, DESC]
    )
    @index(fields: ["accountId", "updatedAt"], order: [ASC, DESC]) {
    id: UUID! @default(expr: "uuidV4()")
    ownerId: String!
    account: Account @ref(fields: "accountId", references: "id")
    accountId: UUID
    name: String!
    address: String
    originalFileName: String!
    uploadType: String!
    originalPath: String!
    status: String!
    salesStatus: String! @default(value: "QUOTING")
    processingError: String
    pageCount: Int!
    createdAt: Timestamp! @default(expr: "request.time")
    updatedAt: Timestamp! @default(expr: "request.time")
}

type Account
    @table
    @index(fields: ["ownerId", "updatedAt"], order: [ASC, DESC]) {
    id: UUID! @default(expr: "uuidV4()")
    ownerId: String!
    companyName: String!
    businessNumber: String
    phoneNumber: String
    primaryContact: AccountContact
        @ref(fields: "primaryContactId", references: "id")
    primaryContactId: UUID
    createdAt: Timestamp! @default(expr: "request.time")
    updatedAt: Timestamp! @default(expr: "request.time")
}

type AccountContact
    @table
    @index(fields: ["accountId", "createdAt"], order: [ASC, ASC]) {
    id: UUID! @default(expr: "uuidV4()")
    account: Account! @ref(fields: "accountId", references: "id")
    accountId: UUID!
    name: String!
    email: String
    phoneNumber: String
    role: String
    createdAt: Timestamp! @default(expr: "request.time")
    updatedAt: Timestamp! @default(expr: "request.time")
}

type UserSettings @table(key: "ownerId") {
    ownerId: String!
    quoteFollowUpEnabled: Boolean! @default(value: true)
    quoteFollowUpDays: Int! @default(value: 3)
    createdAt: Timestamp! @default(expr: "request.time")
    updatedAt: Timestamp! @default(expr: "request.time")
}

type Reminder
    @table
    @index(fields: ["ownerId", "status", "dueAt"], order: [ASC, ASC, ASC])
    @index(fields: ["projectId", "status", "dueAt"], order: [ASC, ASC, ASC]) {
    id: UUID! @default(expr: "uuidV4()")
    ownerId: String!
    project: Project! @ref(fields: "projectId", references: "id")
    projectId: UUID!
    account: Account @ref(fields: "accountId", references: "id")
    accountId: UUID
    name: String!
    status: String!
    dueAt: Timestamp!
    completedAt: Timestamp
    createdAt: Timestamp! @default(expr: "request.time")
    updatedAt: Timestamp! @default(expr: "request.time")
}

type FloorplanPage
    @table
    @index(fields: ["projectId", "pageNumber"], order: [ASC, ASC]) {
    id: UUID! @default(expr: "uuidV4()")
    project: Project! @ref(fields: "projectId", references: "id")
    projectId: UUID!
    pageNumber: Int!
    status: String!
    sourceImagePath: String
    previewImagePath: String
    rawJsonPath: String
    rawFloorplanPath: String
    overlayJson: String
    scaleMmPerPx: Float
    ceilingHeightMm: Float
    referencePointsJson: String
    referenceLengthMm: Float
    processingStrategy: String
    processingMetadataJson: String
    createdAt: Timestamp! @default(expr: "request.time")
    updatedAt: Timestamp! @default(expr: "request.time")
}

type QuantitySource @table {
    id: UUID! @default(expr: "uuidV4()")
    measurementSource: String!
    measurementPlasterType: String
    createdAt: Timestamp! @default(expr: "request.time")
    updatedAt: Timestamp! @default(expr: "request.time")
}

type QuoteItemTemplate @table {
    id: UUID! @default(expr: "uuidV4()")
    ownerId: String
    scope: String!
    systemKey: String @unique
    name: String!
    hasKeywords: Boolean! @default(value: false)
    keywords: [String!]!
    quantitySource: QuantitySource
        @ref(fields: "quantitySourceId", references: "id")
    quantitySourceId: UUID
    sortOrder: Int! @default(value: 0)
    createdAt: Timestamp! @default(expr: "request.time")
    updatedAt: Timestamp! @default(expr: "request.time")
}

type QuoteItemTemplateConfig @table(key: ["ownerId", "templateId"]) {
    ownerId: String!
    template: QuoteItemTemplate! @ref(fields: "templateId", references: "id")
    templateId: UUID!
    enabled: Boolean! @default(value: true)
    unitPriceCents: Int!
    materialUnitPriceCents: Int!
    labourUnitPriceCents: Int!
    createdAt: Timestamp! @default(expr: "request.time")
    updatedAt: Timestamp! @default(expr: "request.time")
}

type Supplier @table {
    id: UUID! @default(expr: "uuidV4()")
    ownerId: String!
    name: String!
    createdAt: Timestamp! @default(expr: "request.time")
    updatedAt: Timestamp! @default(expr: "request.time")
}

type Quote @table {
    id: UUID! @default(expr: "uuidV4()")
    ownerId: String!
    project: Project! @unique @ref(fields: "projectId", references: "id")
    projectId: UUID!
    supplier: Supplier @ref(fields: "supplierId", references: "id")
    supplierId: UUID
    status: String!
    createdAt: Timestamp! @default(expr: "request.time")
    updatedAt: Timestamp! @default(expr: "request.time")
}

type QuoteItem @table {
    id: UUID! @default(expr: "uuidV4()")
    ownerId: String!
    quote: Quote! @ref(fields: "quoteId", references: "id")
    quoteId: UUID!
    sourceTemplate: QuoteItemTemplate
        @ref(fields: "sourceTemplateId", references: "id")
    sourceTemplateId: UUID
    displayOrder: Int!
    name: String!
    quantity: Float!
    quantitySource: QuantitySource
        @ref(fields: "quantitySourceId", references: "id")
    quantitySourceId: UUID
    unitPriceCents: Int!
    materialUnitPriceCents: Int!
    labourUnitPriceCents: Int!
    matchedKeywords: [String!]!
    createdAt: Timestamp! @default(expr: "request.time")
    updatedAt: Timestamp! @default(expr: "request.time")
}

type SupplierQuoteItemPrice @table(key: ["supplierId", "templateId"]) {
    ownerId: String!
    supplier: Supplier! @ref(fields: "supplierId", references: "id")
    supplierId: UUID!
    template: QuoteItemTemplate! @ref(fields: "templateId", references: "id")
    templateId: UUID!
    materialUnitPriceCents: Int!
    createdAt: Timestamp! @default(expr: "request.time")
    updatedAt: Timestamp! @default(expr: "request.time")
}
