type QuestionnaireTemplate
    @table
    @index(fields: ["ownerId", "updatedAt"], order: [ASC, DESC]) {
    id: UUID! @default(expr: "uuidV4()")
    ownerId: String!
    name: String!
    createdAt: Timestamp! @default(expr: "request.time")
    updatedAt: Timestamp! @default(expr: "request.time")
}

type QuestionnaireTemplateQuestion
    @table
    @index(fields: ["templateId", "position"], order: [ASC, ASC]) {
    id: UUID! @default(expr: "uuidV4()")
    template: QuestionnaireTemplate!
        @ref(fields: "templateId", references: "id")
    templateId: UUID!
    label: String!
    position: Int!
    createdAt: Timestamp! @default(expr: "request.time")
    updatedAt: Timestamp! @default(expr: "request.time")
}

type ProjectQuestionnaire @table(key: "projectId") {
    project: Project! @unique @ref(fields: "projectId", references: "id")
    projectId: UUID!
    sourceTemplate: QuestionnaireTemplate
        @ref(fields: "sourceTemplateId", references: "id")
    sourceTemplateId: UUID @index
    createdAt: Timestamp! @default(expr: "request.time")
    updatedAt: Timestamp! @default(expr: "request.time")
}

type ProjectQuestionnaireQuestion
    @table
    @index(fields: ["projectQuestionnaireId", "position"], order: [ASC, ASC]) {
    id: UUID! @default(expr: "uuidV4()")
    projectQuestionnaire: ProjectQuestionnaire!
        @ref(fields: "projectQuestionnaireId", references: "projectId")
    projectQuestionnaireId: UUID!
    label: String!
    position: Int!
    answer: String
    answerSource: String! @default(value: "MANUAL")
    createdAt: Timestamp! @default(expr: "request.time")
    updatedAt: Timestamp! @default(expr: "request.time")
}
