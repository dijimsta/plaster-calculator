query GetFloorplanPageById($projectId: UUID!, $pageId: UUID!)
@auth(level: NO_ACCESS) {
    floorplanPage(
        first: { where: { id: { eq: $pageId }, projectId: { eq: $projectId } } }
    ) {
        id
        projectId
        pageNumber
        status
        processingError
        sourceImagePath
        previewImagePath
        rawJsonPath
        rawFloorplanPath
        overlayJson
        scaleMmPerPx
        ceilingHeightMm
        referencePointsJson
        referenceLengthMm
        processingStrategy
        processingMetadataJson
        createdAt
        updatedAt
    }
}
