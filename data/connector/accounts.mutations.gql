mutation CreateAccount(
    $id: UUID!
    $ownerId: String!
    $companyName: String!
    $businessNumber: String
    $phoneNumber: String
) @auth(level: NO_ACCESS) {
    account_insert(
        data: {
            id: $id
            ownerId: $ownerId
            companyName: $companyName
            businessNumber: $businessNumber
            phoneNumber: $phoneNumber
            createdAt_expr: "request.time"
            updatedAt_expr: "request.time"
        }
    )
}

mutation UpdateAccount(
    $id: UUID!
    $companyName: String
    $businessNumber: String
    $phoneNumber: String
    $primaryContactId: UUID
) @auth(level: NO_ACCESS) {
    account_update(
        id: $id
        data: {
            companyName: $companyName
            businessNumber: $businessNumber
            phoneNumber: $phoneNumber
            primaryContactId: $primaryContactId
            updatedAt_expr: "request.time"
        }
    )
}

mutation DeleteAccountContacts($accountId: UUID!) @auth(level: NO_ACCESS) {
    accountContact_deleteMany(where: { accountId: { eq: $accountId } })
}

mutation DeleteAccount($id: UUID!) @auth(level: NO_ACCESS) {
    account_delete(id: $id)
}

mutation CreateAccountContact(
    $id: UUID!
    $accountId: UUID!
    $name: String!
    $email: String
    $phoneNumber: String
    $role: String
) @auth(level: NO_ACCESS) {
    accountContact_insert(
        data: {
            id: $id
            accountId: $accountId
            name: $name
            email: $email
            phoneNumber: $phoneNumber
            role: $role
            createdAt_expr: "request.time"
            updatedAt_expr: "request.time"
        }
    )
}

mutation UpdateAccountContact(
    $id: UUID!
    $name: String
    $email: String
    $phoneNumber: String
    $role: String
) @auth(level: NO_ACCESS) {
    accountContact_update(
        id: $id
        data: {
            name: $name
            email: $email
            phoneNumber: $phoneNumber
            role: $role
            updatedAt_expr: "request.time"
        }
    )
}

mutation DeleteAccountContact($id: UUID!) @auth(level: NO_ACCESS) {
    accountContact_delete(id: $id)
}
