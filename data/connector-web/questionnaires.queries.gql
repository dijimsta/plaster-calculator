query ListQuestionnaireTemplates @auth(level: USER) {
    questionnaireTemplates(
        where: { ownerId: { eq_expr: "auth.uid" } }
        orderBy: [{ updatedAt: DESC }]
    ) {
        id
        name
        createdAt
        updatedAt
    }
}

query GetQuestionnaireTemplate($id: UUID!) @auth(level: USER) {
    questionnaireTemplate(key: { id: $id })
        @check(
            expr: "this != null && this.ownerId == auth.uid"
            message: "You do not own this template"
        ) {
        id
        ownerId
        name
        createdAt
        updatedAt
        questions: questionnaireTemplateQuestions_on_template(
            orderBy: [{ position: ASC }]
        ) {
            id
            label
            position
        }
    }
}

query GetProjectQuestionnaire($projectId: UUID!) @auth(level: USER) {
    project(key: { id: $projectId })
        @redact
        @check(
            expr: "this != null && this.ownerId == auth.uid"
            message: "You do not own this project"
        ) {
        id
        ownerId
    }
    projectQuestionnaire(key: { projectId: $projectId }) {
        projectId
        sourceTemplateId
        createdAt
        updatedAt
        questions: projectQuestionnaireQuestions_on_projectQuestionnaire(
            orderBy: [{ position: ASC }]
        ) {
            id
            label
            position
            answer
            answerSource
        }
    }
}
