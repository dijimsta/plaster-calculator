mutation UpsertMyUserSettings(
    $quoteFollowUpEnabled: Boolean!
    $quoteFollowUpDays: Int!
) @auth(level: USER) {
    userSettings_upsert(
        data: {
            ownerId_expr: "auth.uid"
            quoteFollowUpEnabled: $quoteFollowUpEnabled
            quoteFollowUpDays: $quoteFollowUpDays
            updatedAt_expr: "request.time"
        }
    )
}

mutation UpsertMyUserSignature(
    $name: String
    $companyName: String
    $address: String
    $mobile: String
    $phone: String
    $email: String
) @auth(level: USER) {
    userSignature_upsert(
        data: {
            ownerId_expr: "auth.uid"
            name: $name
            companyName: $companyName
            address: $address
            mobile: $mobile
            phone: $phone
            email: $email
            updatedAt_expr: "request.time"
        }
    )
}
