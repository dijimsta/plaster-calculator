mutation CreateQuestionnaireTemplate($id: UUID!, $name: String!)
@auth(level: USER) {
    questionnaireTemplate_insert(
        data: {
            id: $id
            ownerId_expr: "auth.uid"
            name: $name
            createdAt_expr: "request.time"
            updatedAt_expr: "request.time"
        }
    )
}

mutation CreateQuestionnaireTemplateQuestion(
    $id: UUID!
    $templateId: UUID!
    $label: String!
    $position: Int!
) @auth(level: USER) @transaction {
    query @redact {
        questionnaireTemplate(key: { id: $templateId })
            @check(
                expr: "this != null && this.ownerId == auth.uid"
                message: "You do not own this template"
            ) {
            id
            ownerId
        }
    }
    questionnaireTemplateQuestion_insert(
        data: {
            id: $id
            templateId: $templateId
            label: $label
            position: $position
            createdAt_expr: "request.time"
            updatedAt_expr: "request.time"
        }
    )
}

