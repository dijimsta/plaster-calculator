mutation DeleteQuestionnaireTemplate($id: UUID!)
@auth(level: USER)
@transaction {
    query @redact {
        questionnaireTemplate(key: { id: $id })
            @check(
                expr: "this != null && this.ownerId == auth.uid"
                message: "You do not own this template"
            ) {
            id
            ownerId
        }
    }
    questionnaireTemplateQuestion_deleteMany(where: { templateId: { eq: $id } })
    questionnaireTemplate_delete(id: $id)
        @check(expr: "this != null", message: "Template not found")
}

mutation EnsureProjectQuestionnaire($projectId: UUID!)
@auth(level: USER)
@transaction {
    query @redact {
        project(key: { id: $projectId })
            @check(
                expr: "this != null && this.ownerId == auth.uid"
                message: "You do not own this project"
            ) {
            id
            ownerId
        }
    }
    projectQuestionnaire_upsert(
        data: { projectId: $projectId, updatedAt_expr: "request.time" }
    )
}

mutation ApplyQuestionnaireTemplateToProject(
    $projectId: UUID!
    $sourceTemplateId: UUID!
) @auth(level: USER) @transaction {
    query @redact {
        project(key: { id: $projectId })
            @check(
                expr: "this != null && this.ownerId == auth.uid"
                message: "You do not own this project"
            ) {
            id
            ownerId
        }
        questionnaireTemplate(key: { id: $sourceTemplateId })
            @check(
                expr: "this != null && this.ownerId == auth.uid"
                message: "You do not own this template"
            ) {
            id
            ownerId
        }
    }
    projectQuestionnaire_upsert(
        data: {
            projectId: $projectId
            sourceTemplateId: $sourceTemplateId
            updatedAt_expr: "request.time"
        }
    )
}

