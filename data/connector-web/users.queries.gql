query GetMyUserSettings @auth(level: USER) {
    userSettings(key: { ownerId_expr: "auth.uid" }) {
        ownerId
        quoteFollowUpEnabled
        quoteFollowUpDays
        createdAt
        updatedAt
    }
}

query GetMyUserSignature @auth(level: USER) {
    userSignature(key: { ownerId_expr: "auth.uid" }) {
        ownerId
        name
        companyName
        address
        mobile
        phone
        email
        createdAt
        updatedAt
    }
}
