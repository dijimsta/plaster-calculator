query ListProjectsByOwner($ownerId: String!) @auth(level: NO_ACCESS) @retired {
    projects(
        where: { ownerId: { eq: $ownerId } }
        orderBy: [{ updatedAt: DESC }]
    ) {
        id
        ownerId
        accountId
        name
        address
        originalFileName
        uploadType
        originalPath
        status
        salesStatus
        processingError
        pageCount
        createdAt
        updatedAt
    }
}

query ListProjectsByOwnerAndSalesStatus(
    $ownerId: String!
    $salesStatus: String!
) @auth(level: NO_ACCESS) {
    projects(
        where: { ownerId: { eq: $ownerId }, salesStatus: { eq: $salesStatus } }
        orderBy: [{ updatedAt: DESC }]
    ) {
        id
        ownerId
        accountId
        name
        address
        originalFileName
        uploadType
        originalPath
        status
        salesStatus
        processingError
        pageCount
        createdAt
        updatedAt
    }
}

