query GetFloorplanPageById($projectId: UUID!, $pageId: UUID!)
@auth(level: NO_ACCESS) {
    floorplanPage(
        first: { where: { id: { eq: $pageId }, projectId: { eq: $projectId } } }
    ) {
        id
        projectId
        pageNumber
        status
        processingError
        sourceImagePath
        previewImagePath
        rawJsonPath
        rawFloorplanPath
        overlayJson
        scaleMmPerPx
        ceilingHeightMm
        referencePointsJson
        referenceLengthMm
        processingStrategy
        processingMetadataJson
        createdAt
        updatedAt
    }
}

query GetUserSettings($ownerId: String!) @auth(level: NO_ACCESS) {
    userSettings(key: { ownerId: $ownerId }) {
        ownerId
        quoteFollowUpEnabled
        quoteFollowUpDays
        createdAt
        updatedAt
    }
}

query ListDueReminders($ownerId: String!) @auth(level: NO_ACCESS) {
    reminders(
        where: {
            ownerId: { eq: $ownerId }
            status: { eq: "OPEN" }
            dueAt: { le_expr: "request.time" }
        }
        orderBy: [{ dueAt: ASC }]
    ) {
        id
        ownerId
        projectId
        accountId
        name
        status
        dueAt
        completedAt
        createdAt
        updatedAt
    }
}

