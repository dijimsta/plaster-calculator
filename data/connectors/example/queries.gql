query GetProjectDetailsById($id: UUID!) @auth(level: NO_ACCESS) {
    project(id: $id) {
        id
        ownerId
        accountId
        name
        address
        originalFileName
        uploadType
        originalPath
        status
        salesStatus
        processingError
        pageCount
        createdAt
        updatedAt
        pages: floorplanPages_on_project(orderBy: [{ pageNumber: ASC }]) {
            id
            projectId
            pageNumber
            status
            processingError
            sourceImagePath
            previewImagePath
            rawJsonPath
            rawFloorplanPath
            overlayJson
            scaleMmPerPx
            ceilingHeightMm
            referencePointsJson
            referenceLengthMm
            processingStrategy
            processingMetadataJson
            createdAt
            updatedAt
        }
    }
}

