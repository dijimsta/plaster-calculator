# Example queries for a simple movie app.

# @auth() directives control who can call each operation.
# Anyone should be able to list all movies, so the auth level is set to PUBLIC
query ListMovies
@auth(level: PUBLIC, insecureReason: "Anyone can list all movies.") {
    movies {
        id
        title
        imageUrl
        genre
    }
}

# List all users, only admins should be able to list all users, so we use NO_ACCESS
query ListUsers @auth(level: NO_ACCESS) {
    users {
        id
        username
    }
}

# Logged in users can list all their reviews and movie titles associated with the review
# Since the query uses the uid of the current authenticated user, we set auth level to USER
query ListUserReviews @auth(level: USER) {
    user(key: { id_expr: "auth.uid" }) {
        id
        username
        # <field>_on_<foreign_key_field> makes it easy to grab info from another table
        # Here, we use it to grab all the reviews written by the user.
        reviews: reviews_on_user {
            rating
            reviewDate
            reviewText
            movie {
                id
                title
            }
        }
    }
}

# Get movie by id
query GetMovieById($id: UUID!)
@auth(level: PUBLIC, insecureReason: "Anyone can get a movie by id.") {
    movie(id: $id) {
        id
        title
        imageUrl
        genre
        metadata: movieMetadata_on_movie {
            rating
            releaseYear
            description
        }
        reviews: reviews_on_movie {
            reviewText
            reviewDate
            rating
            user {
                id
                username
            }
        }
    }
}

# Search for movies, actors, and reviews
query SearchMovie($titleInput: String, $genre: String)
@auth(level: PUBLIC, insecureReason: "Anyone can search for movies.") {
    movies(
        where: {
            _and: [
                { genre: { eq: $genre } }
                { title: { contains: $titleInput } }
            ]
        }
    ) {
        id
        title
        genre
        imageUrl
    }
}

query ListProjectsByOwner($ownerId: String!) @auth(level: NO_ACCESS) {
    projects(
        where: { ownerId: { eq: $ownerId } }
        orderBy: [{ updatedAt: DESC }]
    ) {
        id
        ownerId
        name
        originalFileName
        uploadType
        originalPath
        status
        processingError
        pageCount
        createdAt
        updatedAt
    }
}

query GetProjectById($id: UUID!) @auth(level: NO_ACCESS) {
    project(id: $id) {
        id
        ownerId
        name
        originalFileName
        uploadType
        originalPath
        status
        processingError
        pageCount
        createdAt
        updatedAt
        pages: floorplanPages_on_project(orderBy: [{ pageNumber: ASC }]) {
            id
            projectId
            pageNumber
            status
            sourceImagePath
            previewImagePath
            rawJsonPath
            rawFloorplanPath
            overlayJson
            scaleMmPerPx
            ceilingHeightMm
            referencePointsJson
            referenceLengthMm
            processingStrategy
            processingMetadataJson
            createdAt
            updatedAt
        }
    }
}

query GetFloorplanPageById($projectId: UUID!, $pageId: UUID!)
@auth(level: NO_ACCESS) {
    floorplanPage(
        first: { where: { id: { eq: $pageId }, projectId: { eq: $projectId } } }
    ) {
        id
        projectId
        pageNumber
        status
        sourceImagePath
        previewImagePath
        rawJsonPath
        rawFloorplanPath
        overlayJson
        scaleMmPerPx
        ceilingHeightMm
        referencePointsJson
        referenceLengthMm
        processingStrategy
        processingMetadataJson
        createdAt
        updatedAt
    }
}
