query ListProjectsByOwner($ownerId: String!) @auth(level: NO_ACCESS) {
    projects(
        where: { ownerId: { eq: $ownerId } }
        orderBy: [{ updatedAt: DESC }]
    ) {
        id
        ownerId
        name
        originalFileName
        uploadType
        originalPath
        status
        processingError
        pageCount
        createdAt
        updatedAt
    }
}

query GetProjectDetailsById($id: UUID!) @auth(level: NO_ACCESS) {
    project(id: $id) {
        id
        ownerId
        name
        originalFileName
        uploadType
        originalPath
        status
        processingError
        pageCount
        createdAt
        updatedAt
        pages: floorplanPages_on_project(orderBy: [{ pageNumber: ASC }]) {
            id
            projectId
            pageNumber
            status
            sourceImagePath
            previewImagePath
            rawJsonPath
            rawFloorplanPath
            overlayJson
            scaleMmPerPx
            ceilingHeightMm
            referencePointsJson
            referenceLengthMm
            processingStrategy
            processingMetadataJson
            createdAt
            updatedAt
        }
    }
}

query GetProjectById($id: UUID!) @auth(level: NO_ACCESS) {
    project(id: $id) {
        id
        ownerId
        name
        originalFileName
        uploadType
        originalPath
        status
        processingError
        pageCount
        createdAt
        updatedAt
    }
}

query GetFloorplanPageById($projectId: UUID!, $pageId: UUID!)
@auth(level: NO_ACCESS) {
    floorplanPage(
        first: { where: { id: { eq: $pageId }, projectId: { eq: $projectId } } }
    ) {
        id
        projectId
        pageNumber
        status
        sourceImagePath
        previewImagePath
        rawJsonPath
        rawFloorplanPath
        overlayJson
        scaleMmPerPx
        ceilingHeightMm
        referencePointsJson
        referenceLengthMm
        processingStrategy
        processingMetadataJson
        createdAt
        updatedAt
    }
}
