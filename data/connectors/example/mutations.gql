mutation CreateProjectFromUpload(
    $id: UUID!
    $ownerId: String!
    $accountId: UUID
    $name: String!
    $address: String
    $originalFileName: String!
    $uploadType: String!
    $originalPath: String!
    $status: String!
    $salesStatus: String = "QUOTING"
    $pageCount: Int!
) @auth(level: NO_ACCESS) {
    project_insert(
        data: {
            id: $id
            ownerId: $ownerId
            accountId: $accountId
            name: $name
            address: $address
            originalFileName: $originalFileName
            uploadType: $uploadType
            originalPath: $originalPath
            status: $status
            salesStatus: $salesStatus
            pageCount: $pageCount
            createdAt_expr: "request.time"
            updatedAt_expr: "request.time"
        }
    )
}

mutation UpdateProject(
    $id: UUID!
    $name: String
    $accountId: UUID
    $address: String
    $salesStatus: String
) @auth(level: NO_ACCESS) {
    project_update(
        id: $id
        data: {
            name: $name
            accountId: $accountId
            address: $address
            salesStatus: $salesStatus
            updatedAt_expr: "request.time"
        }
    )
}

mutation RenameProject($id: UUID!, $name: String!) @auth(level: NO_ACCESS) {
    project_update(
        id: $id
        data: { name: $name, updatedAt_expr: "request.time" }
    )
}

mutation TouchProject($id: UUID!, $status: String, $processingError: String)
@auth(level: NO_ACCESS) {
    project_update(
        id: $id
        data: {
            status: $status
            processingError: $processingError
            updatedAt_expr: "request.time"
        }
    )
}

mutation DeleteFloorplanPages($projectId: UUID!) @auth(level: NO_ACCESS) {
    floorplanPage_deleteMany(where: { projectId: { eq: $projectId } })
}

mutation DeleteProject($id: UUID!) @auth(level: NO_ACCESS) {
    project_delete(id: $id)
}

