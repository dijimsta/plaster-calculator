mutation CreateQuestionnaireTemplate($id: UUID!, $name: String!)
@auth(level: USER) {
    questionnaireTemplate_insert(
        data: {
            id: $id
            ownerId_expr: "auth.uid"
            name: $name
            createdAt_expr: "request.time"
            updatedAt_expr: "request.time"
        }
    )
}

mutation CreateQuestionnaireTemplateQuestion(
    $id: UUID!
    $templateId: UUID!
    $label: String!
    $position: Int!
    $description: String
) @auth(level: USER) @transaction {
    query @redact {
        questionnaireTemplate(key: { id: $templateId })
            @check(
                expr: "this != null && this.ownerId == auth.uid"
                message: "You do not own this template"
            ) {
            id
            ownerId
        }
    }
    questionnaireTemplateQuestion_insert(
        data: {
            id: $id
            templateId: $templateId
            label: $label
            position: $position
            description: $description
            createdAt_expr: "request.time"
            updatedAt_expr: "request.time"
        }
    )
}

mutation UpdateQuestionnaireTemplateName($id: UUID!, $name: String!)
@auth(level: USER)
@transaction {
    query @redact {
        questionnaireTemplate(key: { id: $id })
            @check(
                expr: "this != null && this.ownerId == auth.uid"
                message: "You do not own this template"
            ) {
            id
            ownerId
        }
    }
    questionnaireTemplate_update(
        id: $id
        data: { name: $name, updatedAt_expr: "request.time" }
    )
}

mutation UpdateQuestionnaireTemplateQuestion(
    $id: UUID!
    $templateId: UUID!
    $label: String!
    $position: Int!
    $description: String
) @auth(level: USER) @transaction {
    query @redact {
        questionnaireTemplate(key: { id: $templateId })
            @check(
                expr: "this != null && this.ownerId == auth.uid"
                message: "You do not own this template"
            ) {
            id
            ownerId
        }
    }
    questionnaireTemplateQuestion_update(
        id: $id
        data: {
            label: $label
            position: $position
            description: $description
            updatedAt_expr: "request.time"
        }
    )
}

mutation DeleteQuestionnaireTemplateQuestion($id: UUID!, $templateId: UUID!)
@auth(level: USER)
@transaction {
    query @redact {
        questionnaireTemplate(key: { id: $templateId })
            @check(
                expr: "this != null && this.ownerId == auth.uid"
                message: "You do not own this template"
            ) {
            id
            ownerId
        }
    }
    questionnaireTemplateQuestion_delete(id: $id)
}

mutation DeleteQuestionnaireTemplate($id: UUID!)
@auth(level: USER)
@transaction {
    query @redact {
        questionnaireTemplate(key: { id: $id })
            @check(
                expr: "this != null && this.ownerId == auth.uid"
                message: "You do not own this template"
            ) {
            id
            ownerId
        }
    }
    questionnaireTemplateQuestion_deleteMany(where: { templateId: { eq: $id } })
    questionnaireTemplate_delete(id: $id)
        @check(expr: "this != null", message: "Template not found")
}

mutation CreateProjectQuestionnaire(
    $id: UUID!
    $projectId: UUID!
    $sourceTemplateId: UUID
) @auth(level: NO_ACCESS) {
    projectQuestionnaire_insert(
        data: {
            id: $id
            projectId: $projectId
            sourceTemplateId: $sourceTemplateId
            createdAt_expr: "request.time"
            updatedAt_expr: "request.time"
        }
    )
}

mutation CreateProjectQuestionnaireAnswer(
    $id: UUID!
    $projectQuestionnaireId: UUID!
    $questionId: UUID!
    $position: Int!
    $answer: String
) @auth(level: NO_ACCESS) {
    projectQuestionnaireAnswer_insert(
        data: {
            id: $id
            projectQuestionnaireId: $projectQuestionnaireId
            questionId: $questionId
            position: $position
            answer: $answer
            createdAt_expr: "request.time"
            updatedAt_expr: "request.time"
        }
    )
}
