mutation CreateProjectQuestionnaireAnswer(
    $id: UUID!
    $projectQuestionnaireId: UUID!
    $questionId: UUID!
    $position: Int!
    $answer: String
) @auth(level: NO_ACCESS) {
    projectQuestionnaireAnswer_insert(
        data: {
            id: $id
            projectQuestionnaireId: $projectQuestionnaireId
            questionId: $questionId
            position: $position
            answer: $answer
            createdAt_expr: "request.time"
            updatedAt_expr: "request.time"
        }
    )
}
